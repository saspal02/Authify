server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  logging:
    level:
      org:
        springframework.security: DEBUG


security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:auth-backend}
    access-ttl: ${JWT_ACCESS_TTL:3600}
    refresh-ttl: ${JWT_REFRESH_TTL:86400}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}